[build]
  publish = "build/client"
  command = "test -n \"$VITE_GAMES_API_ENDPOINT\" || (echo 'ERROR: VITE_GAMES_API_ENDPOINT is not set' && exit 1); sed -i \"s|{{env.VITE_GAMES_API_ENDPOINT}}|${VITE_GAMES_API_ENDPOINT%/}|g\" netlify.toml && npm run build"

[[redirects]]
  from = "/api/*"
  to = "{{env.VITE_GAMES_API_ENDPOINT}}/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/static/ludo-router/*"
  to = "{{env.VITE_GAMES_API_ENDPOINT}}/static/ludo-router/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200